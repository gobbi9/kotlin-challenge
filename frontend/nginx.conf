server {
    listen 8081;
    root /usr/share/nginx/html;
    index index.html;

    location /coupons {
        proxy_pass http://coupon-service:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
